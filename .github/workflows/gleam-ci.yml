name: Gleam Wrapper CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'wrappers/gleam/**'
      - 'c_src/**'
      - 'src/**'
      - '.github/workflows/gleam-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'wrappers/gleam/**'
      - 'c_src/**'
      - 'src/**'
      - '.github/workflows/gleam-ci.yml'

jobs:
  test-gleam-wrapper:
    name: Test Gleam wrapper
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1.24.0
      with:
        otp-version: '26.2'
        rebar3-version: '3.22.1'
        install-hex: true
        install-rebar: true
        gleam-version: '1.16.0'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsodium-dev cmake build-essential pkg-config

    - name: Build main NIF
      run: |
        rebar3 compile
        cd c_src
        cmake . -DCMAKE_BUILD_TYPE=Release
        make
        cd ..

    - name: Test Gleam wrapper
      run: |
        cd wrappers/gleam
        mkdir -p priv
        cp -f ../../priv/*.so priv/
        gleam deps download
        export ERL_LIBS="../../_build/default/lib:$ERL_LIBS"
        gleam test
